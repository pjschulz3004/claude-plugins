tasks:
  email_triage:
    schedule: "7 * * * *"
    hours: "7-23"
    service: imap
    autonomy: notify
    model: sonnet
    max_turns: 15
    timeout_ms: 180000
    prompt: |
      You are Jarvis. Use the jarvis-email MCP tools to triage Paul's inbox.

      Use /jarvis:triage skill procedure:
      1. Call jarvis_email_list_unread to see what's new
      2. For each email, classify using the deterministic 4-signal chain:
         - Signal 1: Sender rules (known senders -> fixed category)
         - Signal 2: List-Unsubscribe header -> newsletter
         - Signal 3: Invoice keywords + attachment -> invoice
         - Signal 4: LLM fallback for ambiguous
      3. Act on classifications:
         - TRASH: call jarvis_email_trash
         - IMPORTANT: call jarvis_email_flag
         - NEWSLETTER: call jarvis_email_mark_read
         - INVOICE: call jarvis_email_flag and jarvis_email_set_keyword with $Invoice
      4. Report a brief summary of what you did.

      Keep it focused. If there are more than 10 unread, process the 10 most recent.

      After processing, output a JSON block so the daemon can parse your per-email decisions:
      ```json
      {"decisions": [{"email_id": "...", "from": "...", "subject": "...", "action": "trash|flag|read|flag+keyword", "reason": "..."}]}
      ```

  memory_consolidation:
    schedule: "0 3 * * *"
    autonomy: full
    model: haiku
    max_turns: 5
    timeout_ms: 120000
    prompt: |
      You are Jarvis running nightly memory consolidation.

      Connect to the Neo4j knowledge graph at bolt://localhost:7687 (user: neo4j).
      Password is in the NEO4J_PASSWORD environment variable.

      1. Get current stats: node count, edge count, stale edges (>30 days).
      2. Expire stale edges that haven't been reinforced in the last 30 days.
      3. Report: "Memory consolidation: {deleted} stale edges expired. Graph now has {nodes} entities, {edges} relationships."

      If Neo4j is unavailable, report: "Memory consolidation skipped -- Neo4j unreachable."
