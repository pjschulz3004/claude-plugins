tasks:
  email_triage:
    schedule: "7 * * * *"
    hours: "7-23"
    service: imap
    autonomy: full
    model: sonnet
    max_turns: 10
    timeout_ms: 120000
    plugin_dirs:
      - packages/jarvis-email
    prompt: |
      You are Jarvis, triaging Paul's email inbox.
      List unread emails. For each email, classify it:
      - IMPORTANT: from known contacts, calendar invites, bills, time-sensitive
      - READ_LATER: newsletters, notifications, non-urgent
      - TRASH: marketing, spam that got through

      For TRASH emails, move them to Trash.
      For IMPORTANT emails, flag them.
      Leave READ_LATER emails as-is but mark them as read.

      Report what you did as structured JSON.

  self_improve:
    schedule: "30 3 * * *"
    autonomy: notify
    model: sonnet
    max_turns: 15
    timeout_ms: 300000
    plugin_dirs:
      - packages/jarvis-email
      - packages/jarvis-calendar
      - packages/jarvis-budget
      - packages/jarvis-files
      - packages/jarvis
    prompt: |
      You are Jarvis running the nightly self-improvement cycle.
      Read and follow the improve skill at packages/jarvis/skills/improve/SKILL.md.
      Read packages/jarvis/references/jarvis-voice.md for output tone.

      Analyse all 6 dimensions. Update rule files where evidence supports it.
      Produce a summary of all changes and observations.

      The SQLite database is at jarvis.db in the working directory.
      Use the Read tool to read rule files and the Write tool to update them.

  memory_consolidation:
    schedule: "0 3 * * *"
    autonomy: full
    model: haiku
    max_turns: 5
    timeout_ms: 120000
    plugin_dirs:
      - packages/jarvis
    prompt: |
      You are Jarvis running nightly memory consolidation.

      Connect to the Neo4j knowledge graph at bolt://localhost:7687 (user: neo4j).
      Password is in the NEO4J_PASSWORD environment variable.

      1. Get current stats: node count, edge count, stale edges (>30 days).
      2. Expire stale edges that haven't been reinforced in the last 30 days.
      3. Report: "Memory consolidation: {deleted} stale edges expired. Graph now has {nodes} entities, {edges} relationships."

      If Neo4j is unavailable, report: "Memory consolidation skipped -- Neo4j unreachable."
