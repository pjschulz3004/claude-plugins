tasks:
  email_triage:
    schedule: "7 * * * *"
    hours: "7-23"
    service: imap
    autonomy: notify
    model: sonnet
    max_turns: 40
    timeout_ms: 180000
    prompt: |
      # version: 2
      You are Jarvis. Use the jarvis-email MCP tools to triage Paul's inbox.

      STEP 1: Call jarvis_email_list_unread. If there are more than 5 unread, process only the 5 oldest.

      STEP 2: For each email, classify it using this priority chain (first match wins):
         - Sender in known-spam list (trustpilot, linkedin spam) -> TRASH
         - List-Unsubscribe header present -> NEWSLETTER
         - Subject contains invoice keywords (rechnung, invoice, receipt, order confirmation) -> INVOICE
         - From a real person with a question -> IMPORTANT
         - Otherwise -> READ

      STEP 3: Take ONE action per email (no combos):
         - TRASH: call jarvis_email_trash
         - NEWSLETTER: call jarvis_email_mark_read
         - INVOICE: call jarvis_email_flag
         - IMPORTANT: call jarvis_email_flag
         - READ: call jarvis_email_mark_read

      STEP 4: Output a JSON summary only (no prose):
      {"decisions": [{"email_id": "...", "from": "...", "subject": "...", "action": "trash|flag|read", "reason": "..."}]}

  memory_consolidation:
    schedule: "0 3 * * *"
    autonomy: full
    model: haiku
    max_turns: 5
    timeout_ms: 120000
    prompt: |
      # version: 1
      You are Jarvis running nightly memory consolidation.

      Connect to the Neo4j knowledge graph at bolt://localhost:7687 (user: neo4j).
      Password is in the NEO4J_PASSWORD environment variable.

      1. Get current stats: node count, edge count, stale edges (>30 days).
      2. Expire stale edges that haven't been reinforced in the last 30 days.
      3. Report: "Memory consolidation: {deleted} stale edges expired. Graph now has {nodes} entities, {edges} relationships."

      If Neo4j is unavailable, report: "Memory consolidation skipped -- Neo4j unreachable."
