domain: email
version: 1
description: "Email triage rules - deterministic signals checked before LLM fallback"

categories:
  - action_required
  - waiting
  - reference
  - newsletter
  - invoice
  - notification
  - noise

routing:
  - pattern: "to/from it@jschulz.org"
    destination: "INBOX/Business/{category}"
  - pattern: default
    destination: "INBOX/Personal/{category}"
  - pattern: newsletters
    destination: "INBOX/Personal/Newsletters"
  - pattern: invoices
    destination: "INBOX/Business/Invoices"
  - pattern: noise
    destination: Trash

auto_delete_keywords:
  - "$AutoDelete3d: Delete after 3 days"
  - "$AutoDelete7d: Delete after 7 days"

llm_fallback:
  - "From a real person with a question or request -> action_required"
  - "From a real person as a reply in ongoing thread Paul started -> waiting"
  - "Automated but contains useful reference info -> reference"
  - "Bulk/marketing from company Paul doesn't interact with -> noise"
  - "When uncertain, prefer reference over noise (false positive trash is worse)"

rules:
